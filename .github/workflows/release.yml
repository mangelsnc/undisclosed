name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 16
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tagcheck
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm ci

      - name: Lint
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm run lint

      - name: Test
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm test

      - name: Build
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm run build

      - name: Extract release notes
        if: steps.tagcheck.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > .release-notes.md
          if [ ! -s .release-notes.md ]; then
            echo "No changelog entry for v$VERSION" >&2
            exit 1
          fi

      - name: Create tag
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

      - name: Create GitHub Release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          body_path: .release-notes.md

      - name: Publish to npm
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}

      - name: Skip
        if: steps.tagcheck.outputs.exists == 'true'
        run: echo "Tag v${{ steps.pkg.outputs.version }} already exists, nothing to release."
